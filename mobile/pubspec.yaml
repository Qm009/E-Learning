name: elearning_mobile
description: EduFlow - Plateforme E-Learning Mobile (Flutter 3.0+)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Core / Routing
  go_router: ^13.2.0
  flutter_riverpod: ^2.4.9
  
  # Supabase Backend
  supabase_flutter: ^2.3.1
  
  # UI & Design System
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  
  # Utils
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
